apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  annotations:
    texas.nais.io/enabled: "true"
  name: oebs-digihot-api-t1
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: {{ image }}
  port: 8080
  envFrom:
    - secret: oebs-digihot-api-t1
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 11
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    requests:
      cpu: 40m
      memory: 512Mi
    limits:
      memory: 1024Mi
  azure:
    application:
      enabled: true
      allowAllUsers: true
      tenant: trygdeetaten.no

  observability:
    autoInstrumentation:
      enabled: true
      runtime: java

  accessPolicy:
    inbound:
      rules:
        - application: saas-proxy
          namespace: platforce
          cluster: dev-gcp
  prometheus:
    enabled: true
    path: /actuator/prometheus

  ingresses:
    - "https://oebs-digihot-api-t1.intern.dev.nav.no"
    - "https://oebs-digihot-api-t1.dev-fss-pub.nais.io"